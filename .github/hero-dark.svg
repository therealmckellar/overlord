<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#111128"/>
      <stop offset="100%" stop-color="#0d0d24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>
  
  <!-- Glow orbs -->
  <circle cx="640" cy="320" r="200" fill="#06b6d4" opacity="0.04" filter="url(#blur)"/>
  <circle cx="400" cy="200" r="120" fill="#8b5cf6" opacity="0.06" filter="url(#blur)"/>
  <circle cx="900" cy="400" r="150" fill="#06b6d4" opacity="0.05" filter="url(#blur)"/>
  
  <!-- Overlord eye/crown symbol - large center -->
  <g transform="translate(640, 240)">
    <!-- Crown shape -->
    <path d="M-60,20 L-40,-30 L0,0 L40,-30 L60,20 Z" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.9"/>
    <!-- Eye shape inside crown -->
    <ellipse cx="0" cy="0" rx="35" ry="18" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="#06b6d4" opacity="0.9"/>
    <!-- Rays -->
    <g stroke="#06b6d4" stroke-width="1.5" opacity="0.4">
      <line x1="0" y1="-30" x2="0" y2="-50"/>
      <line x1="25" y1="-22" x2="40" y2="-38"/>
      <line x1="-25" y1="-22" x2="-40" y2="-38"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="640" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="8">OVERLORD</text>
  <text x="640" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#06b6d4" letter-spacing="6" opacity="0.8">AGENT COMMAND CENTER</text>
  
  <!-- Feature pills -->
  <g transform="translate(290, 400)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
    <text x="60" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">Model Graph</text>
    
    <rect x="140" y="0" width="100" height="36" rx="18" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="190" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6">Chat</text>
    
    <rect x="260" y="0" width="100" height="36" rx="18" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
    <text x="310" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">Cron</text>
    
    <rect x="380" y="0" width="130" height="36" rx="18" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="445" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6">Workflows</text>
    
    <rect x="530" y="0" width="110" height="36" rx="18" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
    <text x="585" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">Plugins</text>
    
    <rect x="660" y="0" width="120" height="36" rx="18" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="720" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6">Channels</text>
  </g>
  
  <!-- Mini dashboard preview cards -->
  <!-- Left card: Agent status -->
  <g transform="translate(60, 140)" opacity="0.7">
    <rect width="180" height="260" rx="12" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.2"/>
    <text x="16" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#06b6d4" letter-spacing="2">AGENTS</text>
    <g transform="translate(16, 50)">
      <circle cx="8" cy="8" r="4" fill="#22c55e"/><text x="20" y="12" font-family="monospace" font-size="11" fill="#94a3b8">Builder</text>
      <circle cx="8" cy="30" r="4" fill="#22c55e"/><text x="20" y="34" font-family="monospace" font-size="11" fill="#94a3b8">Reviewer</text>
      <circle cx="8" cy="52" r="4" fill="#f59e0b"/><text x="20" y="56" font-family="monospace" font-size="11" fill="#94a3b8">Planner</text>
      <circle cx="8" cy="74" r="4" fill="#22c55e"/><text x="20" y="78" font-family="monospace" font-size="11" fill="#94a3b8">Fast</text>
      <circle cx="8" cy="96" r="4" fill="#6b7280"/><text x="20" y="100" font-family="monospace" font-size="11" fill="#94a3b8">Security</text>
      <circle cx="8" cy="118" r="4" fill="#22c55e"/><text x="20" y="122" font-family="monospace" font-size="11" fill="#94a3b8">SDR</text>
      <circle cx="8" cy="140" r="4" fill="#22c55e"/><text x="20" y="144" font-family="monospace" font-size="11" fill="#94a3b8">Researcher</text>
      <circle cx="8" cy="162" r="4" fill="#22c55e"/><text x="20" y="166" font-family="monospace" font-size="11" fill="#94a3b8">Explorer</text>
    </g>
  </g>
  
  <!-- Right card: Model graph mini -->
  <g transform="translate(1040, 140)" opacity="0.7">
    <rect width="180" height="260" rx="12" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.2"/>
    <text x="16" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b5cf6" letter-spacing="2">MODELS</text>
    <!-- Simple graph -->
    <circle cx="90" cy="80" r="16" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="90" y="84" text-anchor="middle" font-family="monospace" font-size="7" fill="#06b6d4">OWL</text>
    
    <circle cx="50" cy="140" r="14" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="50" y="143" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b5cf6">N3U</text>
    
    <circle cx="130" cy="140" r="14" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="130" y="143" text-anchor="middle" font-family="monospace" font-size="6" fill="#06b6d4">GPT</text>
    
    <circle cx="70" cy="200" r="12" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="70" y="203" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b5cf6">K2</text>
    
    <circle cx="120" cy="200" r="12" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="120" y="203" text-anchor="middle" font-family="monospace" font-size="6" fill="#06b6d4">N2P</text>
    
    <!-- Edges -->
    <line x1="90" y1="96" x2="50" y2="126" stroke="#475569" stroke-width="1" opacity="0.5"/>
    <line x1="90" y1="96" x2="130" y2="126" stroke="#475569" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="154" x2="70" y2="188" stroke="#475569" stroke-width="1" opacity="0.5"/>
    <line x1="130" y1="154" x2="120" y2="188" stroke="#475569" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="154" x2="120" y2="188" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <line x1="130" y1="154" x2="70" y2="188" stroke="#475569" stroke-width="1" opacity="0.3"/>
    
    <!-- Free labels -->
    <text x="50" y="170" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e" opacity="0.7">:free</text>
    <text x="130" y="170" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e" opacity="0.7">:free</text>
  </g>
  
  <!-- Bottom tagline -->
  <text x="640" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" letter-spacing="1">Orchestrate • Build • Review • Deploy — autonomously</text>
</svg>