name: Deploy to Overlord
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & restart on Overlord machine
    runs-on: self-hosted
    env:
      DB_PATH: /home/rmckellar/overlord/data/overlord.db
    steps:
      - name: Sync
        run: |
          cd /home/rmckellar/overlord
          git fetch origin
          # Clean local changes and untracked conflicting files to avoid merge errors on the self-hosted runner
          git reset --hard HEAD
          rm -f src/app/api/tts/route.ts
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "Pulling latest changes..."
            git pull origin main
          else
            echo "Already up to date."
          fi

      - name: Install dependencies
        run: |
          cd /home/rmckellar/overlord
          npm install

      - name: Build
        run: |
          cd /home/rmckellar/overlord
          mkdir -p data
          npm run build

      - name: Restart
        run: |
          cd /home/rmckellar/overlord
          pm2 restart overlord || pm2 start npm --name "overlord" -- run start
        env:
          NODE_ENV: production
          DB_PATH: /home/rmckellar/overlord/data/overlord.db

