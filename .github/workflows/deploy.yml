name: Deploy to Overlord
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & restart on Overlord machine
    runs-on: self-hosted
    env:
      DB_PATH: /home/rmckellar/overlord/data/overlord.db
      NODE_ENV: production
    steps:
      - name: Sync
        run: |
          cd /home/rmckellar/overlord

          git fetch origin

          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "Pulling latest changes..."
            git pull origin main
          else
            echo "Already up to date."
          fi

      - name: Install dependencies
        run: |
          cd /home/rmckellar/overlord
          npm ci --prefer-offline

      - name: Build
        run: |
          cd /home/rmckellar/overlord
          mkdir -p data
          npm run build

      - name: Restart
        run: |
          cd /home/rmckellar/overlord
          pm2 restart overlord || pm2 start npm --name "overlord" -- run start

