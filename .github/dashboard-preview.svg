<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a35"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  
  <rect width="1280" height="640" fill="url(#bg2)"/>
  
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#8b5cf6" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>
  
  <!-- Glow -->
  <circle cx="640" cy="300" r="250" fill="#8b5cf6" opacity="0.04" filter="url(#glow2)"/>
  <circle cx="400" cy="350" r="150" fill="#06b6d4" opacity="0.03" filter="url(#glow2)"/>
  
  <!-- Dashboard mockup - main center panel -->
  <g transform="translate(240, 80)">
    <!-- Window chrome -->
    <rect width="800" height="480" rx="16" fill="#12122a" stroke="#2a2a4a" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="800" height="40" rx="16" fill="#16163a"/>
    <rect y="24" width="800" height="16" fill="#16163a"/>
    <circle cx="24" cy="20" r="6" fill="#ef4444" opacity="0.7"/>
    <circle cx="44" cy="20" r="6" fill="#f59e0b" opacity="0.7"/>
    <circle cx="64" cy="20" r="6" fill="#22c55e" opacity="0.7"/>
    <text x="400" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Overlord — Agent Command Center</text>
    
    <!-- Sidebar -->
    <rect x="0" y="40" width="160" height="440" fill="#0e0e22"/>
    <g transform="translate(16, 64)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#06b6d4" letter-spacing="2" opacity="0.6">NAV</text>
      <rect x="0" y="12" width="128" height="28" rx="6" fill="#06b6d4" opacity="0.12"/>
      <text x="12" y="31" font-family="system-ui, sans-serif" font-size="12" fill="#06b6d4">⬡ Model Graph</text>
      <text x="12" y="61" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">◈ Chat</text>
      <text x="12" y="91" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">⏱ Cron</text>
      <text x="12" y="121" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">🔌 Plugins</text>
      <text x="12" y="151" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">⚡ Workflows</text>
      <text x="12" y="181" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">📡 Channels</text>
      <text x="12" y="211" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">⚙ Config</text>
      <text x="12" y="241" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">🔑 Pairing</text>
      <text x="12" y="271" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">🔗 MCP</text>
      <text x="12" y="301" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">🌐 Webhooks</text>
      <text x="12" y="331" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">🏆 Achieve</text>
    </g>
    
    <!-- Main content area - Chat view -->
    <g transform="translate(170, 56)">
      <!-- Chat messages -->
      <rect x="0" y="0" width="610" height="380" rx="8" fill="#16163a" opacity="0.5"/>
      
      <!-- User message -->
      <rect x="12" y="16" width="360" height="36" rx="12" fill="#06b6d4" opacity="0.15"/>
      <text x="24" y="39" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">Build the SDR pipeline with email sequencing</text>
      
      <!-- AI response -->
      <rect x="12" y="64" width="580" height="80" rx="12" fill="#1e1e3a" stroke="#2a2a4a" stroke-width="0.5"/>
      <text x="24" y="84" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">I'll orchestrate this through the Builder agent with</text>
      <text x="24" y="102" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">the Planner first. Route: Planner → Architect →</text>
      <text x="24" y="120" font-family="system-ui, sans-serif" font-size="12" fill="#06b6d4">Builder → Reviewer</text>
      <text x="140" y="120" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8"> — 4 agents, ~3 min.</text>
      
      <!-- Agent status cards row -->
      <g transform="translate(12, 160)">
        <rect width="140" height="50" rx="8" fill="#1e1e3a" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
        <text x="10" y="20" font-family="monospace" font-size="10" fill="#22c55e">● Planner</text>
        <text x="10" y="36" font-family="monospace" font-size="9" fill="#64748b">nemotron...a55b:free</text>
        
        <rect x="152" width="140" height="50" rx="8" fill="#1e1e3a" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
        <text x="162" y="20" font-family="monospace" font-size="10" fill="#22c55e">● Builder</text>
        <text x="162" y="36" font-family="monospace" font-size="9" fill="#64748b">gpt-oss-120b:free</text>
        
        <rect x="304" width="140" height="50" rx="8" fill="#1e1e3a" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
        <text x="314" y="20" font-family="monospace" font-size="10" fill="#f59e0b">◐ Reviewer</text>
        <text x="314" y="36" font-family="monospace" font-size="9" fill="#64748b">gpt-oss-120b:free</text>
        
        <rect x="456" width="140" height="50" rx="8" fill="#1e1e3a" stroke="#6b7280" stroke-width="1" stroke-opacity="0.4"/>
        <text x="466" y="20" font-family="monospace" font-size="10" fill="#6b7280">○ Security</text>
        <text x="466" y="36" font-family="monospace" font-size="9" fill="#64748b">n3-super...a12b:free</text>
      </g>
      
      <!-- Another user message -->
      <rect x="12" y="230" width="420" height="36" rx="12" fill="#06b6d4" opacity="0.15"/>
      <text x="24" y="253" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">What's the p99 latency on the model graph?</text>
      
      <!-- AI response with data -->
      <rect x="12" y="278" width="580" height="56" rx="12" fill="#1e1e3a" stroke="#2a2a4a" stroke-width="0.5"/>
      <text x="24" y="298" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Model graph p99: </text>
      <text x="138" y="298" font-family="system-ui, sans-serif" font-size="12" fill="#22c55e" font-weight="600">142ms</text>
      <text x="178" y="298" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8"> — Nemotron Ultra is the bottleneck at</text>
      <text x="24" y="318" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">route latency. Recommend caching planner output.</text>
      
      <!-- Input bar -->
      <rect x="12" y="348" width="586" height="36" rx="10" fill="#1e1e3a" stroke="#2a2a4a" stroke-width="1"/>
      <text x="28" y="371" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Message Orchestrate...</text>
      <rect x="558" y="354" width="32" height="24" rx="6" fill="#06b6d4" opacity="0.8"/>
      <text x="574" y="371" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white">↑</text>
    </g>
  </g>
</svg>